name: "Weekly MFA Audit"
on:
    schedule:
        - cron: "0 0 * * 1" # Every Monday at midnight
    workflow_dispatch: # Allow manual run

jobs:
    audit:
        runs-on: ubuntu-latest
        steps:
            - name: Generate MFA Report
              env:
                  GH_TOKEN: ${{ secrets.ORG_AUDIT_TOKEN }}
              run: |
                  # Uses GitHub CLI to list members and their MFA status
                  gh api -H "Accept: application/vnd.github+json" \
                    /orgs/Koa-Partners/members?filter=2fa_disabled > mfa_off.json

                  if [ "$(jq '. | length' mfa_off.json)" -eq "0" ]; then
                    echo "All members have MFA enabled." > report.txt
                  else
                    echo "WARNING: MFA Disabled for these users:" > report.txt
                    jq -r '.[].login' mfa_off.json >> report.txt
                  fi

            - name: Generate App Token
              id: app-token
              uses: actions/create-github-app-token@v1
              with:
                  app-id: ${{ secrets.COMPLIANCE_BOT_APP_ID }}
                  private-key: ${{ secrets.COMPLIANCE_BOT_PRIVATE_KEY }}
                  repositories: compliance-evidence

            - name: Commit to Evidence Repo
              env:
                  GH_TOKEN: ${{ steps.app-token.outputs.token }}
              run: |
                  FILE_PATH="automated-evidence/mfa-reports/report.txt"
                  CONTENT=$(base64 -w 0 report.txt)
                  DATE=$(date -u +%Y-%m-%d)

                  # Get current file SHA if it exists (required for updates)
                  CURRENT_SHA=$(gh api "repos/Koa-Partners/compliance-evidence/contents/${FILE_PATH}" \
                    --jq '.sha' 2>/dev/null || echo "")

                  if [ -n "$CURRENT_SHA" ]; then
                    gh api "repos/Koa-Partners/compliance-evidence/contents/${FILE_PATH}" \
                      --method PUT \
                      -f message="MFA audit report ${DATE}" \
                      -f content="${CONTENT}" \
                      -f sha="${CURRENT_SHA}" \
                      -f branch=main
                  else
                    gh api "repos/Koa-Partners/compliance-evidence/contents/${FILE_PATH}" \
                      --method PUT \
                      -f message="MFA audit report ${DATE}" \
                      -f content="${CONTENT}" \
                      -f branch=main
                  fi
