name: "Weekly MFA Audit"
on:
    schedule:
        - cron: "0 0 * * 1" # Every Monday at midnight
    workflow_dispatch: # Allow manual run

jobs:
    audit:
        runs-on: ubuntu-latest
        steps:
            - name: Generate MFA Report
              env:
                  GH_TOKEN: ${{ secrets.ORG_AUDIT_TOKEN }}
              run: |
                  # Uses GitHub CLI to list members and their MFA status
                  gh api -H "Accept: application/vnd.github+json" \
                    /orgs/Koa-Partners/members?filter=2fa_disabled > mfa_off.json

                  if [ "$(jq '. | length' mfa_off.json)" -eq "0" ]; then
                    echo "All members have MFA enabled." > report.txt
                  else
                    echo "WARNING: MFA Disabled for these users:" > report.txt
                    jq -r '.[].login' mfa_off.json >> report.txt
                  fi

            - name: Generate App Token
              id: app-token
              uses: actions/create-github-app-token@v1
              with:
                  app-id: ${{ secrets.COMPLIANCE_BOT_APP_ID }}
                  private-key: ${{ secrets.COMPLIANCE_BOT_PRIVATE_KEY }}
                  repositories: compliance-evidence

            - name: Commit to Evidence Repo
              env:
                  TOKEN: ${{ steps.app-token.outputs.token }}
              run: |
                  git config --global user.email "bot@koapartnersllc.com"
                  git config --global user.name "Koa Compliance Bot"
                  git clone --single-branch --branch main \
                    "https://x-access-token:${TOKEN}@github.com/Koa-Partners/compliance-evidence.git" \
                    /tmp/evidence-repo
                  mkdir -p /tmp/evidence-repo/automated-evidence/mfa-reports
                  cp report.txt /tmp/evidence-repo/automated-evidence/mfa-reports/
                  cd /tmp/evidence-repo
                  git add .
                  if git diff --staged --quiet; then
                    echo "No changes to commit"
                  else
                    git commit -m "MFA audit report $(date -u +%Y-%m-%d)"
                    git push
                  fi
