name: CodeQL SAST
on:
    workflow_call:
        inputs:
            language:
                description: Language to analyze (javascript, python, go, java)
                required: true
                type: string

jobs:
    codeql:
        runs-on: ubuntu-latest
        permissions:
            security-events: write
            actions: read
            contents: read
        steps:
            - uses: actions/checkout@v4

            - name: Detect source files
              id: detect
              env:
                  LANGUAGE: ${{ inputs.language }}
              run: |
                  case "$LANGUAGE" in
                    javascript) PATTERN='\.(js|ts|jsx|tsx|mjs|cjs)$' ;;
                    python)     PATTERN='\.py$' ;;
                    go)         PATTERN='\.go$' ;;
                    java)       PATTERN='\.java$' ;;
                    *)          PATTERN='\.' ;;
                  esac
                  COUNT=$(find . -not -path '*/node_modules/*' -not -path '*/.git/*' \
                    | grep -cE "$PATTERN" || true)
                  echo "has_source=$([ "$COUNT" -gt 0 ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
                  echo "Found $COUNT $LANGUAGE source files"

            - name: Initialize CodeQL
              if: steps.detect.outputs.has_source == 'true'
              uses: github/codeql-action/init@v4
              with:
                  languages: ${{ inputs.language }}

            - name: Autobuild
              if: steps.detect.outputs.has_source == 'true' && inputs.language != 'javascript' && inputs.language != 'python'
              uses: github/codeql-action/autobuild@v4

            - name: Perform CodeQL Analysis
              if: steps.detect.outputs.has_source == 'true'
              uses: github/codeql-action/analyze@v4
