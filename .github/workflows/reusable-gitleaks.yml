name: Gitleaks Secret Scan
on:
    workflow_call:

jobs:
    gitleaks:
        runs-on: ubuntu-latest
        permissions:
            security-events: write
            actions: read
            contents: read
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Install Gitleaks
              env:
                  GH_TOKEN: ${{ github.token }}
                  # Known-good fallback used only if the latest-release lookup fails.
                  GITLEAKS_FALLBACK_VERSION: "8.18.4"
              run: |
                  set -euo pipefail
                  # Resolve the latest release, authenticated so the lookup isn't
                  # rate-limited (the unauthenticated call returned an error page,
                  # yielding an empty version and a non-gzip download that broke
                  # `tar`). Fall back to a pinned version if the lookup fails.
                  VERSION=$(curl -sSL -H "Authorization: Bearer ${GH_TOKEN}" \
                    https://api.github.com/repos/gitleaks/gitleaks/releases/latest \
                    | grep '"tag_name"' \
                    | sed -E 's/.*"v([^"]+)".*/\1/' || true)
                  if [ -z "${VERSION}" ]; then
                    VERSION="${GITLEAKS_FALLBACK_VERSION}"
                  fi
                  echo "Installing gitleaks ${VERSION}"
                  # --fail so a non-200 response errors here instead of piping an
                  # HTML/JSON error page into tar; download to a file, then extract.
                  curl -sSL --fail \
                    "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
                    -o /tmp/gitleaks.tar.gz
                  tar -xzf /tmp/gitleaks.tar.gz -C /usr/local/bin gitleaks
                  gitleaks version

            - name: Gitleaks Scan
              id: gitleaks
              continue-on-error: true
              run: |
                  gitleaks detect --source . \
                    --exit-code 1 \
                    --report-format sarif \
                    --report-path gitleaks.sarif

            - name: Upload SARIF to GitHub Security tab
              env:
                  GH_TOKEN: ${{ github.token }}
                  REPO: ${{ github.repository }}
                  COMMIT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
                  REF: ${{ github.event.pull_request.number != '' && format('refs/pull/{0}/head', github.event.pull_request.number) || github.ref }}
              run: |
                  SARIF=$(gzip -c gitleaks.sarif | base64 -w0)
                  gh api \
                    --method POST \
                    "/repos/${REPO}/code-scanning/sarifs" \
                    -f "commit_sha=${COMMIT_SHA}" \
                    -f "ref=${REF}" \
                    -f "sarif=${SARIF}"

            - name: Fail if secrets detected
              if: steps.gitleaks.outcome == 'failure'
              run: exit 1
